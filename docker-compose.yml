services:
  # Banco de dados PostgreSQL usado pela API
  postgres:
    image: postgres:16-alpine
    container_name: watch-brasil-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: watch_brasil
      POSTGRES_USER: watch_user
      POSTGRES_PASSWORD: watch_pass
    volumes:
      - watch_brasil_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watch_user -d watch_brasil"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servico principal da API Fastify
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: watch-brasil-api
    ports:
      - "3333:3333"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://watch_user:watch_pass@postgres:5432/watch_brasil
      JWT_SECRET: watch-brasil-dev-secret
      NODE_ENV: development
      PORT: 3333
      HOST: 0.0.0.0
      SEED_DB: "${SEED_DB:-true}"
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: watch-brasil-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    container_name: watch-brasil-web
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # Servico de teste da API (executado sob demanda)
  test:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: watch-brasil-api-test
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://watch_user:watch_pass@postgres:5432/watch_brasil
      JWT_SECRET: watch-brasil-dev-secret
      NODE_ENV: test
      OTEL_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "yarn install && yarn workspace api check-types && yarn workspace api test"
    profiles:
      - test

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: watch-brasil-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: watch-brasil-jaeger
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

volumes:
  watch_brasil_postgres_data:
